services:
  - type: web
    name: thomas-portfolio-api
    runtime: python
    plan: free
    branch: main
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn server:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: MONGO_URL
        value: "mongodb+srv://your-username:your-password@cluster.mongodb.net/?retryWrites=true&w=majority"
      - key: DB_NAME
        value: "thomas_portfolio"
      - key: CORS_ORIGINS
        value: "https://your-frontend.vercel.app"
